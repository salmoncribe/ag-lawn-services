<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipperAI Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="card auth-card">
        <a class="logo" href="/">Clipper<span>AI</span></a>
        <h2 id="auth-mode-title">Sign in to your ClipperAI account</h2>

        <div class="tabs">
          <button class="tab-btn active" data-mode="login">Login</button>
          <button class="tab-btn" data-mode="signup">Sign up</button>
        </div>

        <form id="auth-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" minlength="8" required />
          </div>

          <button class="btn" id="auth-submit" type="submit">Sign in</button>
          <p id="auth-status"></p>
        </form>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/config.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/auth.js"></script>
  </body>
</html>
