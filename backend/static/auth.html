<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClipperAI — Sign In</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
  <main class="auth-shell">
    <section class="card auth-card">
      <a class="logo" href="/">Clipper<span>AI</span></a>
      <h2 id="auth-mode-title">Sign in to your account</h2>

      <div class="tabs">
        <button class="tab-btn active" data-mode="login">Log in</button>
        <button class="tab-btn" data-mode="signup">Sign up</button>
      </div>

      <form id="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min 8 characters" minlength="8" required />
        </div>

        <button class="btn" id="auth-submit" type="submit" style="width: 100%;">Sign in</button>
        <p id="auth-status" class="status-msg"></p>
      </form>
    </section>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/auth.js"></script>
</body>

</html>
